# Build and release the codex-fail-autoban plugin for all supported platforms.
#
# Triggered by pushing a tag named v<version> (e.g. v0.1.0). For each platform
# it builds the CGO dynamic library with the host's native C toolchain, packs
# it into the zip layout required by the CLIProxyAPI plugin store, and uploads
# everything to the GitHub Release bound to that tag.
#
# Output assets (version = tag without the leading "v"):
#   codex-fail-autoban_<version>_linux_amd64.zip      -> codex-fail-autoban.so
#   codex-fail-autoban_<version>_darwin_arm64.zip     -> codex-fail-autoban.dylib
#   codex-fail-autoban_<version>_windows_amd64.zip    -> codex-fail-autoban.dll
#   checksums.txt
name: Release Plugin

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # Each target is built natively (CGO cross-compilation is avoided) so the
        # C toolchain always matches the target arch. The plugin store selects the
        # asset matching each user's GOOS/GOARCH, so broad coverage matters.
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: so
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
            ext: so
          # darwin/amd64 is cross-compiled on the Apple-Silicon runner: Go's cgo
          # targets x86_64 via clang -arch, and the macOS SDK is universal. This
          # avoids the scarce/queued Intel (macos-13) hosted runners.
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: dylib
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: dylib
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build dynamic library
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -buildmode=c-shared -o codex-fail-autoban.${{ matrix.ext }} .
        shell: bash

      - name: Compute version (tag without leading v)
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Pack zip (library at zip root)
        id: pack
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item codex-fail-autoban.${{ matrix.ext }} staging/
          $asset = "codex-fail-autoban_${{ steps.ver.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          # Compress-Archive stores the file at the archive root when given a bare file path.
          Compress-Archive -Path "staging/codex-fail-autoban.${{ matrix.ext }}" -DestinationPath $asset -Force
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.asset }}
          path: ${{ steps.pack.outputs.asset }}
          if-no-files-found: error

  release:
    name: Publish checksums and Release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Compute version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd assets
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/*.zip
            assets/checksums.txt
          generate_release_notes: true
